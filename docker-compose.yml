services:
  app:
    build:
      context: .
      target: production
    container_name: fluxy-app
    restart: unless-stopped
    environment:
      APP_PASSWORD_BASE64: ${APP_PASSWORD_BASE64}
      APP_COMPANY_NAME: ${APP_COMPANY_NAME:-Fluxo Simples}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fluxy
      PORT: 3333
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: fluxy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fluxy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fluxy"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
